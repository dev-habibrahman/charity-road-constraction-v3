<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><title>تبرّع — Donate</title></head><body>
<header class="header"><div class="container nav"><a href="index.html" class="brand"><span class="logo">★</span><span data-i18n="brand">طريق الخير</span></a><nav class="nav-links"><a href="index.html" data-i18n="nav_home"></a><a href="projects.html" data-i18n="nav_projects"></a><a href="impact.html" data-i18n="nav_impact"></a><a href="about.html" data-i18n="nav_about"></a></nav><div class="nav-actions"><button id="lang-btn" class="btn btn-ghost" data-i18n="lang_toggle"></button><a href="donate.html" class="btn btn-primary" data-i18n="nav_donate"></a></div></div></header>
<section class="container" style="max-width:820px">
  <div style="text-align:center;margin-bottom:24px">
    <h1 data-i18n="donate_title"></h1>
    <p class="lead" style="margin:0 auto" data-i18n="donate_sub"></p>
  </div>

  <div id="receipt" class="receipt" style="display:none">
    <h2 style="margin:0 0 6px" data-i18n="receipt_title"></h2>
    <p style="margin:0;font-size:.9rem" data-i18n="receipt_body"></p>
    <div id="receipt-amount" style="margin-top:10px;font-weight:800;color:var(--primary)"></div>
  </div>

  <form id="donate-form" class="form">
    <fieldset class="fieldset">
      <span class="legend" data-i18n="amount"></span>
      <div class="choices">
        <button type="button" class="choice" data-amt="100">100</button>
        <button type="button" class="choice" data-amt="250">250</button>
        <button type="button" class="choice" data-amt="500">500</button>
        <button type="button" class="choice" data-amt="1000">1000</button>
        <button type="button" class="choice" data-amt="2500">2500</button>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;align-items:center">
        <input id="custom-amount" type="number" min="10" class="input" data-i18n-ph="custom_amount">
        <b style="color:var(--muted)" data-i18n="currency"></b>
      </div>
    </fieldset>

    <fieldset class="fieldset">
      <span class="legend" data-i18n="frequency"></span>
      <div class="choices" style="grid-template-columns:1fr 1fr">
        <button type="button" class="choice" data-freq="once" data-i18n="once"></button>
        <button type="button" class="choice" data-freq="monthly" data-i18n="monthly"></button>
      </div>
    </fieldset>

    <div class="row">
      <label class="field"><span data-i18n="full_name"></span><input required class="input"></label>
      <label class="field"><span data-i18n="email"></span><input required type="email" class="input"></label>
      <label class="field"><span data-i18n="phone"></span><input type="tel" class="input"></label>
      <label class="field"><span data-i18n="dedicate"></span><input class="input" data-i18n-ph="dedicate_ph"></label>
    </div>

    <fieldset class="fieldset">
      <span class="legend" data-i18n="pay_with"></span>
      <div class="choices" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
        <button type="button" class="choice" data-pay="card" data-i18n="pay_card"></button>
        <button type="button" class="choice" data-pay="apple" data-i18n="pay_apple"></button>
        <button type="button" class="choice" data-pay="google" data-i18n="pay_google"></button>
        <button type="button" class="choice" data-pay="local" data-i18n="pay_local"></button>
      </div>
    </fieldset>

    <button type="submit" class="btn btn-gold" style="width:100%;padding:16px;font-size:1rem"><span id="submit-label"></span></button>
    <p style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:10px">🔒 <span data-i18n="secure_note"></span></p>
  </form>
</section>
<footer><div class="container"><div><div class="brand" style="color:#fff;margin-bottom:8px"><span class="logo">★</span><span data-i18n="brand"></span></div><p style="color:rgba(247,241,225,.7);font-size:.85rem" data-i18n="tagline"></p></div><div><h4 data-i18n="nav_projects"></h4><a href="projects.html" data-i18n="view_all"></a><a href="about.html" data-i18n="nav_about"></a><a href="impact.html" data-i18n="nav_impact"></a><a href="donate.html" data-i18n="nav_donate"></a></div><div><h4 data-i18n="brand"></h4><p style="color:rgba(247,241,225,.7);font-size:.85rem" data-i18n="footer_about"></p></div></div><div class="copy" data-i18n="footer_rights"></div></footer><script src="app.js"></script></body></html>
